server:
  host: 0.0.0.0
  asr_port: 8000
  nlu_port: 8001
  service_timeout: 120
  gpu: false

inference:
  backend: python
  rust_binary: rust/voice-infer
  rust_ort_dylib: rust/libonnxruntime.so.1.23.0
  rust_ort_opt: disable
  rust_asr_max_new_tokens: 16
  rust_threads: 1

wake:
  backend: asr
  keyword: 你好曼波
  feedback_enabled: true
  text:
    - 你好曼波
    - 曼波
    - 你好，曼波
    - 你好
    - 你好，小曼
    - 你好，小曼波
    - 曼波，你好
  aliases:
    - 你好曼波
    - 曼波
    - 慢播
    - 快播
    - 那波
    - 南波
    - 慢波
    - 曼播
    - 你好慢播
    - 你好快播
    - 你好那波
    - 你好南波
    - 漫波
    - 你好漫波
  audio: audio/mabo.mp3

microphone:
  device: 0

command:
  service_url: http://10.10.20.82:8090/api/v1/local/motion
  service_timeout: 5.0
  fast_response: false
  move_step_timeout_ms: 600
  move_default_timeout_ms: 1200
  auto_stand_before_move: true
  move_prepare_delay_ms: 2000
  move_linear_speed: 0.25
  move_yaw_speed: 0.5
  move_prime_timeout_ms: 1500
  move_post_move_delay_ms: 2000
  move_native_enabled: true
  move_native_default_steps: 3
  move_native_min_steps: 3
  move_native_timeout_ms: 1000
  move_native_linear_speed: 1.0
  move_native_yaw_speed: 1.0
  move_fast_response: false
  move_fast_native_first: false
  move_fast_followup_move: true
  move_fast_followup_delay_ms: 80
  move_fast_auto_stand: true
  move_stop_after_timeout: true
