server:
  host: 0.0.0.0
  asr_port: 8000
  nlu_port: 8001
  service_timeout: 120
  gpu: false

services:
  asr_timeout: 90

audio:
  source: webrtc

models:
  asr: models/asr
  nlu: models/nlu
  nlu_tokenizer: models/nlu/tokenizer

robot:
  ip: 10.10.20.66
  connection_method: LocalSTA
  serial_number:
  aes_128_key:
  username:
  password:
  region: global
  device_type: Go2
  datachannel_timeout: 30
  connect_retries: 3
  retry_delay_ms: 5000
  signaling_timeout: 5
  set_remote_timeout: 15
  filter_remote_candidates: true
  local_ip:
  auto_local_ip: false

kws:
  model_dir: models/kws

wake:
  backend: asr
  keyword: 你好曼波
  feedback_enabled: true
  aliases:
    - 你好曼波
    - 曼波
    - 慢播
    - 快播
    - 那波
    - 南波
    - 慢波
    - 曼播
    - 你好慢播
    - 你好快播
    - 你好那波
    - 你好南波
  text:
    - 你好曼波
    - 曼波
    - 你好，曼波
    - 你好
    - 你好，小曼
    - 你好，小曼波
    - 曼波，你好
  audio: audio/wolile.mp3

microphone:
  device:
  channel: 0
  level_log_interval: 3
  denoise: false
  gain: 1.0
  webrtc_gain: 1.0
  webrtc_denoise: true
  webrtc_target_peak: 12000
  webrtc_noise_gate_rms: 80
  webrtc_noise_gate_attenuation: 0.2
  noise_calibration_seconds: 1.0
  noise_gate_multiplier: 2.5
  noise_gate_min_rms: 120
  noise_gate_attenuation: 0.15

hardware_serial:
  port: auto
  baudrate: 115200
  reconnect_interval: 3
  audio_channel: 0
  audio_queue_size: 200
  auto_start_audio: true
  software_wake_fallback: true
  follow_wake_angle: true
  follow_wake_beam: true
  set_wake_keyword: false
  wake_keyword:
  wake_threshold: "700"
  beam_directions:
    - 60deg
    - 120deg
    - 180deg
    - 240deg
    - 300deg
    - 0deg
  audio_channel_directions:
    - 60deg
    - 120deg
    - 180deg
    - 240deg
    - 300deg
    - 0deg
  audio_channel_angles:
    - 60
    - 120
    - 180
    - 240
    - 300
    - 0
  beam_audio_channels:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5

vad:
  mode: silence
  aggressiveness: 2
  debug: true
  debug_interval: 1.0
  silence_rms: 300
  silence_multiplier: 2.5
  command_silence_rms: 360
  command_silence_multiplier: 1.15
  silence_timeout_ms: 1800
  min_speech_ms: 240
  command_listen_timeout_ms: 8000
  utterance_pad_ms: 240

command:
  output_dir: output
  service_url: http://10.10.20.82:8090/api/v1/local/motion
  service_timeout: 5
  move_step_timeout_ms: 1200
  move_default_timeout_ms: 1200
  auto_stand_before_move: true
  move_prepare_delay_ms: 1200
  move_repeat_count: 5
  move_repeat_interval_ms: 150
  move_linear_speed: 0.2
  move_yaw_speed: 0.5
  move_continuous: true
  move_continuous_fields:
    - continous_move
    - continuous_move
  move_stop_after_timeout: true
  success_audio: audio/wolile.mp3
  failed_audio: audio/command_failed.wav
  action_audio:
    move_forward: audio/wolile.mp3
    move_backward: audio/wolile.mp3
    move_left: audio/wolile.mp3
    move_right: audio/wolile.mp3
    turn_left: audio/wolile.mp3
    turn_right: audio/wolile.mp3
    stand_up: audio/wolile.mp3
    sit_down: audio/wolile.mp3
    lie_down: audio/wolile.mp3
    greet: audio/wolile.mp3
    shake_body: audio/wolile.mp3
    stretch: audio/wolile.mp3
    stop: audio/wolile.mp3
  rules_enabled: false
  feedback_suppress_ms: 1800
