server:
  host: 0.0.0.0
  asr_port: 8000
  nlu_port: 8001
  service_timeout: 120
  gpu: false

services:
  asr_timeout: 3
  asr_retries: 0
  asr_retry_delay_ms: 0
  asr_max_new_tokens: 16
  nlu_timeout: 1.2
  nlu_retries: 0
  nlu_retry_delay_ms: 0
  nlu_structured_early_stop: true

audio:
  source: onboard  # onboared webrtc

models:
  asr: models/asr
  nlu: models/nlu
  nlu_tokenizer: models/nlu/tokenizer

robot:
  ip: 10.10.20.66
  connection_method: LocalSTA
  serial_number:
  aes_128_key:
  username:
  password:
  region: global
  device_type: Go2
  datachannel_timeout: 30
  connect_retries: 3
  retry_delay_ms: 5000
  signaling_timeout: 5
  set_remote_timeout: 15
  filter_remote_candidates: true
  local_ip:
  auto_local_ip: false

kws:
  model_dir: models/kws

wake:
  backend: asr
  keyword: 你好曼波
  feedback_enabled: true
  aliases:
    - 你好曼波
    - 曼波
    - 慢播
    - 快播
    - 那波
    - 南波
    - 慢波
    - 曼播
    - 你好慢播
    - 你好快播
    - 你好那波
    - 你好南波
  text:
    - 你好曼波
    - 曼波
    - 你好，曼波
    - 你好
    - 你好，小曼
    - 你好，小曼波
    - 曼波，你好
  audio: audio/mabo.mp3

microphone:
  device:
  channel: 0
  level_log_interval: 3
  denoise: false
  gain: 1.0
  webrtc_gain: 2.2
  webrtc_denoise: false
  webrtc_target_peak: 18000
  webrtc_noise_gate_rms: 45
  webrtc_noise_gate_attenuation: 0.6
  noise_calibration_seconds: 1.0
  noise_gate_multiplier: 2.5
  noise_gate_min_rms: 120
  noise_gate_attenuation: 0.15

respeaker:
  doa_enabled: true
  doa_required: false
  vid: 0x2886
  pid:
  doa_interval: 0.1
  doa_log_interval: 3
  angle_offset: 0

hardware_serial:
  port: auto
  baudrate: 115200
  reconnect_interval: 3
  audio_channel: 0
  audio_queue_size: 200
  auto_start_audio: true
  software_wake_fallback: true
  follow_wake_angle: true
  follow_wake_beam: true
  set_wake_keyword: false
  wake_keyword:
  wake_threshold: "700"
  beam_directions:
    - 60deg
    - 120deg
    - 180deg
    - 240deg
    - 300deg
    - 0deg
  audio_channel_directions:
    - 60deg
    - 120deg
    - 180deg
    - 240deg
    - 300deg
    - 0deg
  audio_channel_angles:
    - 60
    - 120
    - 180
    - 240
    - 300
    - 0
  beam_audio_channels:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5

vad:
  mode: silence
  aggressiveness: 2
  debug: false
  debug_interval: 1.0
  silence_rms: 180
  silence_multiplier: 2.0
  command_silence_rms: 160
  command_silence_multiplier: 1.05
  silence_timeout_ms: 300
  command_silence_timeout_ms: 180
  min_speech_ms: 240
  command_listen_timeout_ms: 8000
  utterance_pad_ms: 20
  utterance_trim_enabled: true
  utterance_trim_pad_ms: 30

command:
  output_dir: output
  service_url: http://10.10.20.82:8090/api/v1/local/motion
  service_timeout: 1.0
  fast_response: true
  move_step_timeout_ms: 600
  move_default_timeout_ms: 1200
  auto_stand_before_move: false
  move_prepare_delay_ms: 0
  move_linear_speed: 0.25
  move_yaw_speed: 0.5
  move_prime_timeout_ms: 1500
  move_post_move_delay_ms: 0
  move_native_enabled: true
  move_native_default_steps: 3
  move_native_min_steps: 3
  move_native_timeout_ms: 1000
  move_native_linear_speed: 1.0
  move_native_yaw_speed: 1.0
  move_fast_response: true
  move_fast_native_first: true
  move_fast_followup_move: true
  move_fast_followup_delay_ms: 80
  move_fast_auto_stand: false
  move_stop_after_timeout: true
  success_audio: audio/曼波wow.mp3
  failed_audio: audio/曼波我嘞个豆.mp3
  unavailable_audio: audio/曼波哈基米.mp3
  
  action_audio:
    move_forward: audio/曼波-2026-05-29-10-15-[大喊]-齐步走！.mp3
    move_backward: audio/曼波-2026-05-29-10-16-退-退-退.mp3
    move_left: audio/曼波-2026-05-29-10-16-[喊叫]-向左转，齐步走.mp3
    move_right: audio/曼波-2026-05-29-10-17-[喊叫]-向右转，齐步走.mp3
    turn_left: audio/曼波-2026-05-29-10-17-[喊叫]-向左转！.mp3
    turn_right: audio/曼波-2026-05-29-10-17-[喊叫]-向右转！.mp3
    stand_up: audio/曼波-2026-05-29-10-14-我[强调]立了.mp3
    sit_down: audio/曼波-2026-05-29-10-18-我蹲了.mp3
    lie_down: audio/曼波-2026-05-29-10-18-我躺平了.mp3
    greet: audio/曼波-2026-05-29-10-20-[喊叫]-你好吊毛.mp3
    shake_body: audio/曼波duang.mp3
    stretch: audio/曼波傻笑.mp3
    stop: audio/曼波啊米诺斯.mp3
  rules_enabled: false
  rules_fast_path: true
  feedback_async: true
  feedback_suppress_ms: 500
